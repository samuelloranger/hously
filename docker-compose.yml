services:
  db:
    image: postgres:15
    container_name: hously-db-dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-hously}
      POSTGRES_USER: ${POSTGRES_USER:-hously}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hously_password}
      POSTGRES_HOST_AUTH_METHOD: trust
    volumes:
      - db_data_dev:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_HOST_PORT:-5433}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hously}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  minio:
    image: minio/minio:latest
    container_name: hously-minio
    restart: unless-stopped
    ports:
      - "${MINIO_PORT:-9002}:9000"
      - "${MINIO_CONSOLE_PORT:-9003}:9001"
    volumes:
      - minio_data:/data
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
      - MINIO_REGION=us-east-1
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    container_name: hously-minio-init
    depends_on:
      minio:
        condition: service_healthy
    environment:
      - MC_HOST_local=http://${MINIO_ROOT_USER:-minioadmin}:${MINIO_ROOT_PASSWORD:-minioadmin}@minio:9000
      - S3_BUCKET_NAME=${S3_BUCKET_NAME:-hously-images}
    entrypoint: /bin/sh
    command:
      - -c
      - |
        echo 'Waiting for Minio to be ready...';
        until mc ready local; do
          echo 'Minio not ready, waiting...';
          sleep 2;
        done;
        echo "Creating bucket $${S3_BUCKET_NAME} if it does not exist...";
        mc mb --ignore-existing local/$${S3_BUCKET_NAME};
        echo 'Setting bucket policy to private...';
        mc policy set private local/$${S3_BUCKET_NAME};
        echo 'Minio setup completed successfully!';

  redis:
    image: redis:7-alpine
    container_name: hously-redis-dev
    restart: unless-stopped
    ports:
      - "${REDIS_HOST_PORT:-6380}:6379"
    volumes:
      - redis_data_dev:/data
    command: >
      sh -c "
      if [ -n \"$$REDIS_PASSWORD\" ]; then
        redis-server --requirepass \"$$REDIS_PASSWORD\"
      else
        redis-server
      fi
      "
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}

volumes:
  db_data_dev:
  minio_data:
    driver: local
  redis_data_dev:
