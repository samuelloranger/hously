<style>
  .layouts-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-top: 16px;
  }
  .layout-card {
    border: 2px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    cursor: pointer;
    transition: border-color 0.15s, box-shadow 0.15s;
    background: var(--surface-1);
  }
  .layout-card:hover { border-color: var(--accent); }
  .layout-card.selected { border-color: var(--accent); box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 25%, transparent); }
  .layout-label {
    padding: 10px 14px;
    font-size: 0.8rem;
    font-weight: 600;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: var(--text-muted);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .layout-label .badge {
    background: var(--accent);
    color: white;
    border-radius: 4px;
    padding: 1px 6px;
    font-size: 0.65rem;
  }
  .app-shell {
    display: flex;
    height: 160px;
    background: var(--surface-2);
    position: relative;
  }
  /* Nav items */
  .nav-icon {
    width: 28px;
    height: 28px;
    background: var(--surface-1);
    border-radius: 6px;
    opacity: 0.6;
    flex-shrink: 0;
  }
  .nav-icon.active {
    background: var(--accent);
    opacity: 1;
  }
  /* LEFT */
  .shell-left { flex-direction: row; }
  .rail-left {
    width: 42px;
    background: var(--surface-1);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 8px 0;
    gap: 6px;
    flex-shrink: 0;
  }
  /* RIGHT */
  .shell-right { flex-direction: row-reverse; }
  .rail-right {
    width: 42px;
    background: var(--surface-1);
    border-left: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 8px 0;
    gap: 6px;
    flex-shrink: 0;
  }
  /* TOP */
  .shell-top { flex-direction: column; }
  .rail-top {
    height: 38px;
    background: var(--surface-1);
    border-bottom: 1px solid var(--border);
    display: flex;
    flex-direction: row;
    align-items: center;
    padding: 0 10px;
    gap: 6px;
    flex-shrink: 0;
  }
  .rail-top .nav-icon { width: 24px; height: 24px; }
  /* BOTTOM */
  .shell-bottom { flex-direction: column-reverse; }
  .rail-bottom {
    height: 38px;
    background: var(--surface-1);
    border-top: 1px solid var(--border);
    display: flex;
    flex-direction: row;
    align-items: center;
    justify-content: center;
    padding: 0 10px;
    gap: 6px;
    flex-shrink: 0;
  }
  .rail-bottom .nav-icon { width: 24px; height: 24px; }
  /* Content area */
  .content-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 6px;
    padding: 10px;
    overflow: hidden;
  }
  .content-header {
    height: 14px;
    background: var(--surface-1);
    border-radius: 4px;
    width: 40%;
  }
  .content-row {
    height: 10px;
    background: var(--surface-1);
    border-radius: 4px;
    opacity: 0.5;
  }
  .content-row.w80 { width: 80%; }
  .content-row.w60 { width: 60%; }
  .content-row.w90 { width: 90%; }
  .content-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 5px;
    margin-top: 2px;
  }
  .content-card {
    height: 30px;
    background: var(--surface-1);
    border-radius: 4px;
    opacity: 0.4;
  }
</style>
