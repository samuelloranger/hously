name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"
      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-
      - name: Install dependencies
        run: bun install --frozen-lockfile
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
      - name: Prettier format check
        run: bun run formatCheck

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"
      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-
      - name: Install dependencies
        run: bun install --frozen-lockfile
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
      - name: Generate TanStack Router route tree
        run: cd apps/web && bunx @tanstack/router-cli generate
      - name: Lint
        run: cd apps/web && bun run lint

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"
      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-
      - name: Install dependencies
        run: bun install --frozen-lockfile
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
      - name: Generate TanStack Router route tree
        run: cd apps/web && bunx @tanstack/router-cli generate
      - name: Typecheck
        run: bun run typecheck

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"
      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-
      - name: Install dependencies
        run: bun install --frozen-lockfile
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
      - name: Generate TanStack Router route tree
        run: cd apps/web && bunx @tanstack/router-cli generate
      - name: Test
        run: |
          cd apps/web && bun run test --run
          cd ../api && bun test test/ && bun test src/
