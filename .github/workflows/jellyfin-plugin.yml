name: Build Jellyfin Plugin

on:
  release:
    types: [published]

permissions:
  contents: write
  pull-requests: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect plugin changes
        id: changes
        shell: bash
        run: |
          PREV_TAG="$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || true)"
          if [ -z "$PREV_TAG" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          COUNT="$(git diff --name-only "$PREV_TAG" HEAD -- apps/jellyfin-plugin/ | wc -l)"
          if [ "$COUNT" -gt 0 ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup .NET
        if: steps.changes.outputs.changed == 'true'
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Build
        if: steps.changes.outputs.changed == 'true'
        run: dotnet build apps/jellyfin-plugin/Jellyfin.Plugin.HouslyWatchlist.sln --configuration Release

      - name: Package
        if: steps.changes.outputs.changed == 'true'
        id: package
        shell: bash
        run: |
          TAG="${{ github.event.release.tag_name }}"
          VERSION="${TAG#v}"
          ZIP="Jellyfin.Plugin.HouslyWatchlist_v${VERSION}.zip"
          DLL="apps/jellyfin-plugin/Jellyfin.Plugin.HouslyWatchlist/bin/Release/net9.0/Jellyfin.Plugin.HouslyWatchlist.dll"
          zip -j "$ZIP" "$DLL"
          MD5="$(md5sum "$ZIP" | awk '{print $1}')"
          echo "zip=$ZIP" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "md5=$MD5" >> "$GITHUB_OUTPUT"

      - name: Update manifest
        if: steps.changes.outputs.changed == 'true'
        env:
          RELEASE_NAME: ${{ github.event.release.name }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          PLUGIN_VERSION: ${{ steps.package.outputs.version }}
          PLUGIN_ZIP: ${{ steps.package.outputs.zip }}
          PLUGIN_MD5: ${{ steps.package.outputs.md5 }}
          REPOSITORY: ${{ github.repository }}
        shell: bash
        run: |
          python - <<'PY'
          import json
          import os
          from datetime import datetime, timezone

          path = "apps/jellyfin-plugin/manifest.json"
          with open(path, encoding="utf-8") as f:
              manifest = json.load(f)

          version = os.environ["PLUGIN_VERSION"]
          entry = {
              "version": version,
              "changelog": os.environ.get("RELEASE_NAME") or os.environ["RELEASE_TAG"],
              "targetAbi": "10.11.7.0",
              "sourceUrl": f"https://github.com/{os.environ['REPOSITORY']}/releases/download/{os.environ['RELEASE_TAG']}/{os.environ['PLUGIN_ZIP']}",
              "checksum": os.environ["PLUGIN_MD5"],
              "timestamp": datetime.now(timezone.utc).replace(microsecond=0).isoformat().replace("+00:00", "Z"),
          }

          versions = [v for v in manifest[0].get("versions", []) if v.get("version") != version]
          manifest[0]["versions"] = [entry] + versions

          with open(path, "w", encoding="utf-8") as f:
              json.dump(manifest, f, indent=2)
              f.write("\n")
          PY

      - name: Commit manifest update
        if: steps.changes.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          BRANCH="chore/plugin-manifest-${{ github.event.release.tag_name }}"
          git checkout -b "$BRANCH"
          git add apps/jellyfin-plugin/manifest.json
          git commit -m "chore(plugin): update manifest for ${{ github.event.release.tag_name }}" || exit 0
          git push origin "$BRANCH" --force
          gh pr create \
            --title "chore(plugin): update manifest for ${{ github.event.release.tag_name }}" \
            --body "Automated manifest update from CD pipeline." \
            --base main \
            --head "$BRANCH"
          gh pr merge "$BRANCH" --squash --auto --delete-branch

      - name: Upload release asset
        if: steps.changes.outputs.changed == 'true'
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.package.outputs.zip }}
