name: Build and Deploy

on:
  push:
    branches: [ main ]
    tags: [ 'v*.*.*' ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Signal build started
      run: |
        curl -s -X POST \
          -H "X-Gitea-Signal-Token: ${{ secrets.HOUSLY_BUILD_SIGNAL_SECRET }}" \
          https://hously.example.com/api/webhooks/gitea/builds/signal || true

    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Build image
      run: |
        docker build -t hously-api:latest -f Dockerfile.api .

    - name: Restart containers
      if: github.ref == 'refs/heads/main'
      run: |
        docker run --rm \
          -v /var/run/docker.sock:/var/run/docker.sock \
          -v /home/samuelloranger/servers/hously:/project:ro \
          -w /project \
          docker:cli \
          docker compose -p hously up -d --force-recreate hously

