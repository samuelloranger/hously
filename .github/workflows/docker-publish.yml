name: Build and Deploy

on:
  push:
    branches: [ main ]
    tags: [ 'v*.*.*' ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Build and deploy
      run: |
        rm -rf /tmp/hously-build
        git clone --depth=1 \
          "https://samuelloranger:${{ secrets.REGISTRY_TOKEN }}@git.example.com/samuelloranger/hously.git" \
          /tmp/hously-build

        docker build -t hously-web:latest -f /tmp/hously-build/Dockerfile.web /tmp/hously-build
        docker build -t hously-api:latest -f /tmp/hously-build/Dockerfile.api /tmp/hously-build

    - name: Restart containers
      if: github.ref == 'refs/heads/main'
      run: docker compose -f ~/servers/hously/docker-compose.yml up -d --force-recreate hously-web hously-api
