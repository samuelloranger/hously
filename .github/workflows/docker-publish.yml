name: Build and Deploy

on:
  push:
    branches: [ main ]
    tags: [ 'v*.*.*' ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      run: |
        rm -rf "${{ github.workspace }}"
        git clone --depth=1 \
          "https://samuelloranger:${{ secrets.REGISTRY_TOKEN }}@git.example.com/samuelloranger/hously.git" \
          "${{ github.workspace }}"

    - name: Build images
      working-directory: ${{ github.workspace }}
      run: |
        docker build -t hously-web:latest -f Dockerfile.web .
        docker build -t hously-api:latest -f Dockerfile.api .

    - name: Restart containers
      if: github.ref == 'refs/heads/main'
      run: |
        docker compose -f ~/servers/hously/docker-compose.yml up -d --force-recreate hously-web hously-api
