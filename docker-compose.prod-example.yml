services:
  hously-api:
    image: ghcr.io/samuelloranger/hously-api:v1.0.0
    environment:
      - DATABASE_URL=postgresql://hously_user:hously_password@db:5432/hously_db
      - JWT_SECRET= # Generate your own JWT secret
      - CORS_ORIGIN=https://hously.yourwebsite.com
      # Web Push notification keys (generate with: npx web-push generate-vapid-keys)
      - VAPID_PUBLIC_KEY=
      - VAPID_PRIVATE_KEY=
      # S3/MinIO configuration for image uploads
      - S3_ENDPOINT_URL=http://minio:9000
      - S3_ACCESS_KEY= # Generated with minio
      - S3_SECRET_KEY= # Generated with minio
      - S3_BUCKET_NAME= # Generated with minio
      - S3_REGION=us-east-1
      - S3_USE_SSL=false
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    networks:
      - hously-network
    ports:
      - "3000:3000"

  hously-web:
    image: ghcr.io/samuelloranger/hously-web:v1.0.0
    restart: unless-stopped
    networks:
      - hously-network
    ports:
      - "5173:5173"

  db:
    image: postgres:15.8-alpine
    container_name: hously-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: hously_db
      POSTGRES_USER: hously_user
      POSTGRES_PASSWORD: hously_password
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - hously-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hously_user"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    ports:
      - "5432:5432"

  minio:
    image: minio/minio:RELEASE.2024-10-02T17-50-41Z
    container_name: hously-minio
    restart: unless-stopped
    volumes:
      - minio_data:/data
    environment:
      - MINIO_ROOT_USER=hously_root_user
      - MINIO_ROOT_PASSWORD=hously_root_password
      - MINIO_REGION=us-east-1
    command: server /data --console-address ":9001"
    networks:
      - hously-network
    ports:
      - "9000:9000"
      - "9001:9001"

networks:
  hously-network:
    driver: bridge

volumes:
  db_data:
  minio_data:
    driver: local
