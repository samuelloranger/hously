services:
  hously:
    image: ghcr.io/samuelloranger/hously:latest
    container_name: hously
    env_file:
      - .env
    environment:
      - SERVE_STATIC=true
    volumes:
      - ./data:/app/data
      - ./vapid_keys:/app/vapid_keys
      - ./certs:/app/certs:ro
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    networks:
      - hously-network
    ports:
      - "3000:3000"

  db:
    image: postgres:15-alpine
    container_name: hously-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - hously-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: hously-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --bind 0.0.0.0 --protected-mode yes
    volumes:
      - redis_data:/data
    networks:
      - hously-network

  minio:
    image: minio/minio:latest
    container_name: hously-minio
    restart: unless-stopped
    volumes:
      - minio_data:/data
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
      - MINIO_REGION=us-east-1
    command: server /data --console-address ":9001"
    networks:
      - hously-network
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    container_name: hously-minio-init
    depends_on:
      minio:
        condition: service_healthy
    environment:
      - MC_HOST_local=http://${MINIO_ROOT_USER}:${MINIO_ROOT_PASSWORD}@minio:9000
    entrypoint: /bin/sh
    command:
      - -c
      - |
        until mc ready local; do sleep 2; done;
        mc mb --ignore-existing local/hously-images;
        mc policy set private local/hously-images;
    networks:
      - hously-network

networks:
  hously-network:
    driver: bridge

volumes:
  db_data:
  redis_data:
  minio_data:
