<!doctype html>
<html>
  <head>
    <title>Hously Watchlist</title>
  </head>
  <body>
    <div
      id="HouslyWatchlistConfigPage"
      data-role="page"
      class="page type-interior pluginConfigurationPage"
      data-require="emby-input,emby-button"
    >
      <div data-role="content">
        <div class="content-primary">
          <form id="HouslyWatchlistConfigForm">
            <div class="inputContainer">
              <label class="inputLabel" for="houslyBaseUrl"
                >Hously Base URL</label
              >
              <input id="houslyBaseUrl" name="HouslyBaseUrl" type="url" />
              <div class="fieldDescription">
                Example: https://hously.example.com
              </div>
            </div>
            <div class="inputContainer">
              <label class="inputLabel" for="adminToken">Sync Token</label>
              <input
                id="adminToken"
                name="AdminToken"
                type="password"
                autocomplete="new-password"
              />
              <div class="fieldDescription">
                Paste the sync token generated in Hously's Jellyfin integration
                settings.
              </div>
            </div>
            <div class="inputContainer">
              <label class="inputLabel" for="syncIntervalMinutes"
                >Sync Interval (minutes)</label
              >
              <input
                id="syncIntervalMinutes"
                name="SyncIntervalMinutes"
                type="number"
                min="5"
                max="1440"
              />
            </div>
            <div class="detailSection">
              <h2>User mappings</h2>
              <div class="fieldDescription">
                Map Jellyfin user IDs to Hously user IDs. These must match the
                mappings saved in Hously.
              </div>
              <div id="mappingRows"></div>
              <button
                is="emby-button"
                type="button"
                id="addMappingBtn"
                class="raised emby-button"
              >
                Add mapping
              </button>
            </div>
            <br />
            <div>
              <button
                is="emby-button"
                type="submit"
                class="raised button-submit block emby-button"
              >
                Save
              </button>
              <button
                is="emby-button"
                type="button"
                id="syncNowBtn"
                class="raised block emby-button"
              >
                Sync Now
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>
    <script type="text/javascript">
      (function () {
        var pluginUniqueId = "a3f4e2c1-8d6b-4f9a-b2e7-1c5d9f3a7e2b";
        var page = document.querySelector("#HouslyWatchlistConfigPage");
        var mappingRows = document.querySelector("#mappingRows");
        var savedToken = "";

        function createMappingRow(mapping) {
          var row = document.createElement("div");
          row.className = "mappingRow";
          row.style.display = "grid";
          row.style.gridTemplateColumns = "1fr 160px auto";
          row.style.gap = "0.75rem";
          row.style.alignItems = "end";
          row.style.marginBottom = "0.75rem";
          row.innerHTML =
            '<div class="inputContainer">' +
            '<label class="inputLabel">Jellyfin User ID</label>' +
            '<input class="jellyfinUserId" type="text" />' +
            "</div>" +
            '<div class="inputContainer">' +
            '<label class="inputLabel">Hously User ID</label>' +
            '<input class="houslyUserId" type="number" min="1" />' +
            "</div>" +
            '<button is="emby-button" type="button" class="raised emby-button removeMappingBtn">Remove</button>';
          row.querySelector(".jellyfinUserId").value =
            mapping && mapping.JellyfinUserId ? mapping.JellyfinUserId : "";
          row.querySelector(".houslyUserId").value =
            mapping && mapping.HouslyUserId ? mapping.HouslyUserId : "";
          row
            .querySelector(".removeMappingBtn")
            .addEventListener("click", function () {
              row.remove();
            });
          mappingRows.appendChild(row);
        }

        function readMappings() {
          return Array.prototype.slice
            .call(mappingRows.querySelectorAll(".mappingRow"))
            .map(function (row) {
              return {
                JellyfinUserId: row
                  .querySelector(".jellyfinUserId")
                  .value.trim(),
                HouslyUserId:
                  parseInt(row.querySelector(".houslyUserId").value, 10) || 0,
              };
            })
            .filter(function (mapping) {
              return mapping.JellyfinUserId && mapping.HouslyUserId > 0;
            });
        }

        page.addEventListener("pageshow", function () {
          ApiClient.getPluginConfiguration(pluginUniqueId).then(
            function (config) {
              document.querySelector("#houslyBaseUrl").value =
                config.HouslyBaseUrl || "";
              document.querySelector("#adminToken").value = "";
              document.querySelector("#syncIntervalMinutes").value =
                config.SyncIntervalMinutes || 15;
              savedToken = config.AdminToken || "";
              mappingRows.innerHTML = "";
              (config.UserMappings || []).forEach(createMappingRow);
              if (!config.UserMappings || config.UserMappings.length === 0) {
                createMappingRow();
              }
            },
          );
        });

        document
          .querySelector("#addMappingBtn")
          .addEventListener("click", function () {
            createMappingRow();
          });

        document
          .querySelector("#HouslyWatchlistConfigForm")
          .addEventListener("submit", function (e) {
            e.preventDefault();
            ApiClient.getPluginConfiguration(pluginUniqueId).then(
              function (config) {
                var token = document.querySelector("#adminToken").value;
                config.HouslyBaseUrl = document
                  .querySelector("#houslyBaseUrl")
                  .value.trim()
                  .replace(/\/+$/, "");
                if (token) {
                  config.AdminToken = token;
                  savedToken = token;
                }
                config.SyncIntervalMinutes =
                  parseInt(
                    document.querySelector("#syncIntervalMinutes").value,
                    10,
                  ) || 15;
                config.UserMappings = readMappings();
                ApiClient.updatePluginConfiguration(
                  pluginUniqueId,
                  config,
                ).then(function (result) {
                  Dashboard.processPluginConfigurationUpdateResult(result);
                });
              },
            );
          });

        document
          .querySelector("#syncNowBtn")
          .addEventListener("click", function () {
            var token =
              document.querySelector("#adminToken").value || savedToken;
            if (!token) {
              Dashboard.alert("Save the sync token first.");
              return;
            }

            fetch("/hously/webhook/sync", {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
                Authorization: "Bearer " + token,
              },
              body: JSON.stringify({ jellyfin_user_id: null }),
            })
              .then(function (response) {
                if (!response.ok) {
                  throw new Error("Sync failed");
                }
                Dashboard.alert("Sync queued.");
              })
              .catch(function () {
                Dashboard.alert("Sync failed.");
              });
          });
      })();
    </script>
  </body>
</html>
